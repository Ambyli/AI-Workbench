services:
  vllm-llama:
    image: vllm/vllm-openai:v0.6.6
    container_name: vllm-llama
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "8003:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    command: >
      --model meta-llama/Llama-3.2-3B-Instruct
      --dtype float16
      --max-model-len 4096
      --gpu-memory-utilization 0.5

  vllm-qwen:
    image: vllm/vllm-openai:v0.6.6
    container_name: vllm-qwen
    restart: unless-stopped
    depends_on:
      vllm-llama:
        condition: service_healthy
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "8002:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    command: >
      --model Qwen/Qwen2.5-3B-Instruct
      --dtype float16
      --max-model-len 4096
      --gpu-memory-utilization 0.5

volumes:
  vllm_data:
